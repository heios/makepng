<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Turn any image into a transparent PNG: crop, pick a color, tune sensitivity, download." />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='8' height='8' fill='%23888'/%3E%3Crect x='8' y='8' width='8' height='8' fill='%23888'/%3E%3Crect x='8' width='8' height='8' fill='%23ccc'/%3E%3Crect y='8' width='8' height='8' fill='%23ccc'/%3E%3C/svg%3E" />
    <title>makepng — transparent PNG maker</title>
  </head>
  <body>
    <header>
      <div>
        <h1>makepng</h1>
        <p data-i18n="tagline">Drop an image → crop → click the color to remove → tune → download PNG</p>
      </div>
      <div id="header-controls">
        <label class="header-select"><span data-i18n="language">Language</span>
          <select id="lang"></select>
        </label>
        <label class="header-select"><span data-i18n="theme">Theme</span>
          <select id="theme">
            <option value="auto" selected data-i18n="auto">Auto</option>
            <option value="light" data-i18n="themeLight">Light</option>
            <option value="dark" data-i18n="themeDark">Dark</option>
          </select>
        </label>
      </div>
    </header>

    <main>
      <div id="dropzone" tabindex="0">
        <strong data-i18n="dropTitle">Drop an image here</strong>
        <span data-i18n="dropHint">or click to choose, or paste from clipboard</span>
        <input id="file-input" type="file" accept="image/*" hidden />
      </div>

      <div id="workspace" hidden>
        <div id="canvas-wrap">
          <div id="checker">
            <canvas id="view"></canvas>
            <canvas id="overlay"></canvas>
          </div>
        </div>

        <aside id="controls">
          <section>
            <h2 data-i18n="crop">Crop</h2>
            <div class="row">
              <button id="crop-toggle" type="button" data-i18n="selectRegion">Select region</button>
              <button id="crop-apply" type="button" disabled data-i18n="applyCrop">Apply crop</button>
            </div>
            <div class="row">
              <button id="reset-image" type="button" data-i18n="resetImage">Reset image</button>
            </div>
          </section>

          <section>
            <h2 data-i18n="transparency">Transparency</h2>
            <div class="row">
              <button id="pick-toggle" type="button" data-i18n="pickColor">Pick color</button>
              <span id="key-swatch"></span>
              <button id="key-clear" type="button" disabled>×</button>
            </div>
            <label><span data-i18n="sensitivity">Sensitivity</span> <output for="tol">15</output>
              <input id="tol" type="range" min="0" max="100" value="15" />
            </label>
            <label data-i18n-title="spreadTip"><span data-i18n="spread">Spread</span> <output for="spread">10</output>
              <input id="spread" type="range" min="0" max="100" value="10" />
            </label>
          </section>

          <section>
            <h2 data-i18n="adjust">Adjust</h2>
            <label><span data-i18n="brightness">Brightness</span> <output for="brightness">0</output>
              <input id="brightness" type="range" min="-100" max="100" value="0" />
            </label>
            <label><span data-i18n="contrast">Contrast</span> <output for="contrast">0</output>
              <input id="contrast" type="range" min="-100" max="100" value="0" />
            </label>
            <label><span data-i18n="rotate">Rotate</span> <output for="rotate">0°</output>
              <input id="rotate" type="range" min="-180" max="180" value="0" />
            </label>
            <label><span data-i18n="resize">Resize</span> <output for="scale">100%</output>
              <input id="scale" type="range" min="1" max="400" value="100" />
            </label>
          </section>

          <section>
            <h2 data-i18n="output">Output</h2>
            <p id="size-readout">– × – px</p>
            <p id="filesize-readout">–</p>
            <button id="download" type="button" class="primary" data-i18n="download">Download PNG</button>
          </section>
        </aside>
      </div>
    </main>

    <footer>
      <a href="https://github.com/heios/makepng" data-i18n="source">source</a>
    </footer>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
